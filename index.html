<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>WM 2026 Tippspiel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--dark:#0D1117;--card:#161B22;--border:#30363D;
  --text:#E6EDF3;--muted:#7D8590;--green:#2EA043;--red:#DA3633;
  --card2:#1C2128;--max:960px;
}
body{background:var(--dark);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.screen{display:none}.screen.active{display:block}
.wrap{max-width:var(--max);margin:0 auto;padding:0 14px}

/* HOME */







input[type=text]{flex:1;background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--gold)}
.btn-add{background:var(--dark);border:1px solid var(--border);border-radius:8px;color:var(--gold);font-size:22px;width:44px;cursor:pointer;flex-shrink:0}







/* PLAYER SELECT */
#playerSelect{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;text-align:center}
.sel-title{font-size:22px;font-weight:800;margin-bottom:6px}
.sel-sub{color:var(--muted);font-size:13px;margin-bottom:24px}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;width:100%;max-width:var(--max)}
.btn-player{background:var(--card);border:1px solid var(--border);border-radius:14px;color:var(--text);padding:18px 14px;font-size:15px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;transition:border-color .15s}
.btn-player:hover{border-color:var(--gold)}
.av{width:44px;height:44px;border-radius:50%;background:var(--gold);color:#0D1117;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0}
.pmeta{font-size:11px;color:var(--muted)}
.done-badge{font-size:11px;background:#1a3d1a;color:var(--green);border:1px solid #2ea04340;border-radius:10px;padding:2px 7px}
.action-row{display:flex;gap:10px;width:100%;max-width:var(--max);margin-top:12px}
.btn-act{flex:1;background:var(--card);border:1px solid var(--border);border-radius:11px;color:var(--text);padding:12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-act:hover{border-color:var(--gold)}
.btn-act.dim{color:var(--muted)}

/* STICKY HEADER */
.sticky-hdr{position:sticky;top:0;background:var(--dark);border-bottom:1px solid var(--border);padding:11px 14px;z-index:100}
.hdr-inner{max-width:var(--max);margin:0 auto;display:flex;align-items:center;gap:10px}
.back-btn{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;padding:0;line-height:1}
.hdr-name{font-weight:700;font-size:16px}
.hdr-sub{font-size:11px;color:var(--muted)}
.progress-text{margin-left:auto;color:var(--muted);font-size:12px;white-space:nowrap}

/* TABS */
.tab-bar{background:var(--dark);border-bottom:1px solid var(--border);padding:0 14px}
.tab-bar-inner{max-width:var(--max);margin:0 auto;display:flex;gap:0}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:color .15s,border-color .15s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* TIPS SCREEN */
#tips{padding-bottom:120px}
.tab-content{display:none}.tab-content.active{display:block}

/* Date section */
.date-section{padding:0}
.date-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;padding:16px 14px 6px;border-top:1px solid var(--border);margin-top:2px}
.date-label:first-child{border-top:none;margin-top:0}
.matches-grid{max-width:var(--max);margin:0 auto;padding:0 12px;display:grid;gap:7px;grid-template-columns:1fr}
@media(min-width:600px){.matches-grid{grid-template-columns:1fr 1fr}}

.match-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:9px 11px}
.match-meta{font-size:10px;color:var(--muted);margin-bottom:6px;display:flex;gap:6px;align-items:center}
.time-badge{background:var(--card2);border-radius:4px;padding:1px 5px;font-weight:600;font-size:10px}
.time-badge.night{color:#f4a261}
.time-badge.prime{color:var(--green)}
.match-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:5px}
.team{font-size:13px;font-weight:600;line-height:1.2}
.team.right{text-align:right}
.score-wrap{display:flex;align-items:center;gap:4px}
.score-inp{width:38px;height:38px;background:#21262D;border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:16px;font-weight:700;text-align:center;outline:none;padding:0;-moz-appearance:textfield}
.score-inp::-webkit-outer-spin-button,.score-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.score-inp:focus{border-color:var(--gold)}
.score-inp.v{background:#1a2332;color:var(--gold);border-color:#30363D}
.score-sep{color:var(--muted);font-weight:700;font-size:13px}
.ko-ph{background:var(--card);border:1px dashed var(--border);border-radius:11px;padding:13px;color:var(--muted);font-size:12px;text-align:center;margin:0 12px 7px;max-width:var(--max)}
@media(min-width:600px){.ko-ph{margin:0 12px 7px}}

/* GROUPS TAB */
.groups-wrap{max-width:var(--max);margin:0 auto;padding:12px}
.groups-grid{display:grid;gap:10px;grid-template-columns:1fr}
@media(min-width:600px){.groups-grid{grid-template-columns:1fr 1fr}}
@media(min-width:900px){.groups-grid{grid-template-columns:1fr 1fr 1fr}}

.group-card{background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden}
.group-card-title{background:var(--card2);padding:8px 12px;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase}
.group-table{width:100%;border-collapse:collapse}
.group-table th{font-size:10px;color:var(--muted);padding:5px 8px;text-align:right;font-weight:600;border-bottom:1px solid var(--border)}
.group-table th:first-child{text-align:left}
.group-table td{font-size:12px;padding:6px 8px;border-bottom:1px solid #21262D;text-align:right}
.group-table td:first-child{text-align:left;font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.group-table tr:last-child td{border-bottom:none}
.group-table tr.qualified td{color:var(--green)}
.group-table tr.maybe td{color:var(--gold)}
.pts-col{font-weight:700;color:var(--text)}

/* SAVE BAR */
.save-bar{position:fixed;bottom:56px;left:0;right:0;background:var(--green);color:white;text-align:center;padding:13px;font-weight:700;font-size:14px;cursor:pointer;z-index:150;display:none}

/* RESULTS SCREEN */
#results{padding-bottom:80px}
.res-hdr{background:var(--dark);border-bottom:1px solid var(--border);padding:13px 14px}
.res-hdr-inner{max-width:var(--max);margin:0 auto;font-size:20px;font-weight:800}
.lb-wrap{max-width:var(--max);margin:0 auto;padding:0 12px}

.podium{padding:18px 0 8px;display:flex;justify-content:center;align-items:flex-end;gap:8px}
.pod-item{flex:1;max-width:120px;text-align:center}
.pod-medal{font-size:22px;margin-bottom:3px}
.pod-name{font-size:13px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pod-pts{font-size:20px;font-weight:800;color:var(--gold)}
.pod-block{background:var(--card);border:1px solid var(--border);border-radius:7px 7px 0 0;margin-top:6px}
.pod-item.p1 .pod-block{height:76px;border-color:var(--gold)}
.pod-item.p2 .pod-block{height:52px}
.pod-item.p3 .pod-block{height:36px}

.lb-list{display:grid;gap:7px;margin-bottom:8px}
@media(min-width:600px){.lb-list{grid-template-columns:1fr 1fr}}
.lb-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px;display:flex;align-items:center;gap:9px}
.lb-rank{font-size:12px;color:var(--muted);width:16px;text-align:center}
.lb-av{width:34px;height:34px;border-radius:50%;background:var(--gold);color:#0D1117;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.lb-name{font-weight:600;font-size:13px}
.lb-sub{font-size:11px;color:var(--muted)}
.lb-pts{margin-left:auto;text-align:right}
.lb-num{font-weight:800;font-size:16px;color:var(--gold)}
.lb-lbl{font-size:10px;color:var(--muted)}

.sec-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:14px 0 7px}
.pts-legend{font-size:12px;color:var(--muted);padding-bottom:10px}

.res-grid{display:grid;gap:6px}
@media(min-width:600px){.res-grid{grid-template-columns:1fr 1fr}}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.res-top{display:flex;justify-content:space-between;align-items:center;gap:7px;margin-bottom:5px}
.res-teams{font-size:12px;font-weight:600;line-height:1.3}
.res-date{font-size:10px;color:var(--muted)}
.res-score{display:flex;align-items:center;gap:4px}
.score-mini{width:32px;height:32px;background:#21262D;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-weight:700;text-align:center;outline:none;padding:0;-moz-appearance:textfield}
.score-mini::-webkit-outer-spin-button,.score-mini::-webkit-inner-spin-button{-webkit-appearance:none}
.score-mini:focus{border-color:var(--gold)}
.tips-row{display:flex;flex-wrap:wrap;gap:4px}
.tip-bub{font-size:10px;border-radius:5px;padding:2px 6px}
.tip-bub.ok{background:#1a3d1a;color:var(--green);border:1px solid #2ea04330}
.tip-bub.nok{background:#3d1a1a;color:#f47174;border:1px solid #da363330}
.tip-bub.nd{background:var(--card2);color:var(--muted);border:1px solid var(--border)}

/* KO admin (results screen) */
.ko-admin{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:10px}
.ko-admin-title{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:10px}
.ko-round-block{margin-bottom:8px}
.ko-round-name{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600}
.ko-existing{font-size:11px;padding:3px 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);margin-bottom:4px}
.ko-pair-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.ko-inp{flex:1;min-width:70px;background:#21262D;border:1px solid var(--border);border-radius:6px;padding:7px 9px;color:var(--text);font-size:12px;outline:none}
.ko-inp:focus{border-color:var(--gold)}
.ko-date-inp{width:75px;flex:none}
.btn-ko-add{background:var(--gold);color:#0D1117;border:none;border-radius:6px;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-ko-rm{background:none;border:none;color:var(--red);cursor:pointer;font-size:15px;padding:0}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200}
.nav-btn{flex:1;background:none;border:none;color:var(--muted);padding:9px 4px 11px;font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn .ni{font-size:20px}
.nav-btn.active{color:var(--gold)}

.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ei{font-size:44px;margin-bottom:10px}
</style>
</head>
<body>

<!-- PLAYER SELECT -->
<div id="playerSelect" class="screen">
  <div class="sel-title">Wer bist du?</div>
  <div class="sel-sub">Wähle deinen Namen</div>
  <div class="player-grid" id="playerButtons"></div>
  <div class="action-row" id="actionRow"></div>
</div>

<!-- TIPS -->
<div id="tips" class="screen">
  <div class="sticky-hdr">
    <div class="hdr-inner">
      <button class="back-btn" onclick="showPlayerSelect()">←</button>
      <div><div class="hdr-name" id="tipsName"></div><div class="hdr-sub">Deine Tipps</div></div>
      <div class="progress-text" id="tipsProgress"></div><div id="syncDot" style="width:8px;height:8px;border-radius:50%;background:var(--muted);margin-left:8px;flex-shrink:0" title="Sync-Status"></div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab-bar-inner">
      <button class="tab active" onclick="switchTab('byDate',this)">📅 Nach Datum</button>
      <button class="tab" onclick="switchTab('byGroup',this)">📊 Gruppen</button>
    </div>
  </div>
  <div id="byDate" class="tab-content active"></div>
  <div id="byGroup" class="tab-content"></div>
  <div class="save-bar" id="saveBar" onclick="saveTipsBack()">✓ Tipps speichern</div>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="res-hdr"><div class="res-hdr-inner">🏅 Rangliste</div></div>
  <div class="lb-wrap">
    <div id="lbContent"></div>
    <div class="sec-title">Ergebnisse eintragen</div>
    <div class="pts-legend">Exakt = 3 Pkt · Richtige Tendenz = 1 Pkt</div>
    <div id="resList"></div>
  </div>
</div>

<!-- NAV -->
<div class="bottom-nav" id="bottomNav" style="display:none">
  <button class="nav-btn active" id="navT" onclick="showTipsNav()"><span class="ni">⚽</span>Tippen</button>
  <button class="nav-btn" id="navR" onclick="showResultsScreen()"><span class="ni">🏅</span>Rangliste</button>
  <button class="nav-btn" id="navP" onclick="showPlayerSelect()"><span class="ni">👤</span>Spieler</button>
</div>

// ── BY DATE ──
function renderByDate(){

  const byDate={};
  all.forEach(m=>{

  });

  const DAYS=['So','Mo','Di','Mi','Do','Fr','Sa'];
  let html='';
  sortedDates.forEach(dt=>{
    const ms=byDate[dt].sort((a,b)=>(a.t||'99:99').localeCompare(b.t||'99:99'));
    const label = dt!=='unbekannt' ? (() => {
      const d=new Date(dt+'T12:00:00');
      return `${DAYS[d.getDay()]}, ${d.getDate()}.${d.getMonth()+1}.`;
    })() : 'KO-Phase';
    html+=`<div class="date-label">${label}</div><div class="matches-grid">`;

  });

}

// ── BY GROUP ──
function renderByGroup(){
  const p=S.currentPlayer, tips=S.tips[p]||{};
  // Group phase groups
  let html='<div class="groups-wrap"><div class="groups-grid">';
  GROUPS.forEach(g=>{
    const standing=calcStanding(g.n);
    html+=`<div class="group-card">
      <div class="group-card-title">Gruppe ${g.n}</div>
      <table class="group-table">
        <tr><th>Team</th><th>Sp</th><th>T</th><th>Pkt</th></tr>`;
    standing.forEach((row,i)=>{
      const cls=i<2?'qualified':i===2?'maybe':'';
      html+=`<tr class="${cls}"><td>${row.team}</td><td>${row.played}</td><td>${row.gf}:${row.ga}</td><td class="pts-col">${row.pts}</td></tr>`;
    });
    html+='</table>';
    // matches
    html+='<div style="padding:6px">';
    g.ms.forEach(m=>{
      html+=`<div style="margin-bottom:5px">${matchCard(m,tips[m.id]||{h:'',a:''})}</div>`;
    });
    html+='</div></div>';
  });
  html+='</div>';
  // KO rounds
  KO_ROUNDS.forEach(r=>{
    const rms=(S.koMatches||[]).filter(m=>m.round===r.id);
    if(rms.length>0){
      html+=`<div class="date-label" style="margin-top:10px">${r.label}</div><div class="matches-grid">`;
      rms.forEach(m=>{ html+=matchCard(m,tips[m.id]||{h:'',a:''}); });
      html+='</div>';
    }
  });
  html+='</div>';
  document.getElementById('byGroup').innerHTML=html;
}

function calcStanding(groupName){
  const g=GROUPS.find(g=>g.n===groupName);
  const teams={};
  g.teams.forEach(t=>{ teams[t]={team:t,played:0,pts:0,gf:0,ga:0,gd:0}; });
  g.ms.forEach(m=>{
    const res=(S.results||{})[m.id];
    if(!res||res.h===''||res.a==='') return;
    const rh=parseInt(res.h), ra=parseInt(res.a);
    teams[m.h].played++; teams[m.a].played++;
    teams[m.h].gf+=rh; teams[m.h].ga+=ra;
    teams[m.a].gf+=ra; teams[m.a].ga+=rh;
    teams[m.h].gd=teams[m.h].gf-teams[m.h].ga;
    teams[m.a].gd=teams[m.a].gf-teams[m.a].ga;
    if(rh>ra){ teams[m.h].pts+=3; }
    else if(rh===ra){ teams[m.h].pts+=1; teams[m.a].pts+=1; }
    else{ teams[m.a].pts+=3; }
  });
  return Object.values(teams).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

function matchCard(m, tip){
  const hv=tip.h!==''?tip.h:'', av=tip.a!==''?tip.a:'';
  const t=m.t||'';
  const h=parseInt(t); // hour
  const isMidnight=h>=0&&h<7;
  const timeCls=isMidnight?'night':(h>=18&&h<=22?'prime':'');
  const grpLbl=m.group?`Gr.${m.group}`:(m.round?KO_ROUNDS.find(r=>r.id===m.round)?.label||'KO':'KO');
  return `<div class="match-card">
    <div class="match-meta">
      ${t?`<span class="time-badge ${timeCls}">${t}</span>`:''}
      <span>${grpLbl}</span>
      ${m.venue?`<span>· ${m.venue}</span>`:''}
    </div>
    <div class="match-row">
      <div class="team">${m.h}</div>
      <div class="score-wrap">
        <input type="number" inputmode="numeric" min="0" max="99" class="score-inp${hv!==''?' v':''}" value="${hv}"
          data-id="${m.id}" data-side="h" oninput="tipIn(this)" onchange="tipIn(this)">
        <span class="score-sep">:</span>
        <input type="number" inputmode="numeric" min="0" max="99" class="score-inp${av!==''?' v':''}" value="${av}"
          data-id="${m.id}" data-side="a" oninput="tipIn(this)" onchange="tipIn(this)">
      </div>
      <div class="team right">${m.a}</div>
    </div>
  </div>`;
}

function tipIn(el){
  const p=S.currentPlayer, id=el.dataset.id, side=el.dataset.side;
  if(!S.tips[p])S.tips[p]={};
  if(!S.tips[p][id])S.tips[p][id]={h:'',a:''};
  S.tips[p][id][side]=el.value===''?'':parseInt(el.value);
  el.classList.toggle('v',el.value!=='');
  save(); updateProgress(); updateSaveBar();
}

function updateProgress(){
  const p=S.currentPlayer, all=allMatches(S), tips=S.tips[p]||{};

}

// WM 2026 bracket: top2 from each group + 8 best 3rd-place teams
// The actual bracket is fixed by FIFA. We store KO matches manually for now,
// but auto-generate suggested pairings when group phase is complete.
function groupComplete(gn){
  const g=GROUPS.find(g=>g.n===gn);
  return g.ms.every(m=>{ const r=(S.results||{})[m.id]; return r&&r.h!==''&&r.a!==''; });
}
function allGroupsComplete(){
  return GROUPS.every(g=>groupComplete(g.n));
}

function calcPts(player){
  let pts=0,exact=0,tend=0;
  const tips=S.tips[player]||{};
  Object.entries(S.results||{}).forEach(([id,res])=>{
    const tip=tips[id];
    if(!tip||tip.h===''||tip.a==='') return;
    if(res.h===''||res.a==='') return;
    const rh=+res.h,ra=+res.a,th=+tip.h,ta=+tip.a;
    if(th===rh&&ta===ra){pts+=3;exact++;}
    else if(Math.sign(rh-ra)===Math.sign(th-ta)){pts+=1;tend++;}
  });
  return {pts,exact,tend};
}

function renderResults(){
  const scores=S.players.map(p=>({name:p,...calcPts(p)})).sort((a,b)=>b.pts-a.pts);
  const lb=document.getElementById('lbContent');
  const hasRes=Object.keys(S.results||{}).some(k=>{const r=S.results[k];return r&&r.h!==''&&r.a!=='';});

  if(!hasRes){
    lb.innerHTML=`<div class="empty"><div class="ei">⏳</div><p>Noch keine Ergebnisse eingetragen</p></div>`;
  } else {
    let pod='';
    if(scores.length>=2){
      const [s1,s2,s3]=scores;
      const items=s3?[{s:s2,cls:'p2',m:'🥈'},{s:s1,cls:'p1',m:'🥇'},{s:s3,cls:'p3',m:'🥉'}]
                    :[{s:s2,cls:'p2',m:'🥈'},{s:s1,cls:'p1',m:'🥇'}];
      pod=`<div class="podium">${items.map(({s,cls,m})=>`
        <div class="pod-item ${cls}">
          <div class="pod-medal">${m}</div>
          <div class="pod-name">${s.name}</div>
          <div class="pod-pts">${s.pts}</div>
          <div class="pod-block"></div>
        </div>`).join('')}</div>`;
    }
    lb.innerHTML=pod+`<div class="lb-list">${
      scores.map((s,i)=>`<div class="lb-row">
        <div class="lb-rank">${i+1}</div>
        <div class="lb-av">${s.name[0].toUpperCase()}</div>
        <div><div class="lb-name">${s.name}</div><div class="lb-sub">${s.exact} exakt · ${s.tend} Tendenz</div></div>
        <div class="lb-pts"><div class="lb-num">${s.pts}</div><div class="lb-lbl">Pkt</div></div>
      </div>`).join('')
    }</div>`;
  }

  // Build result entry
  const DAYS=['So','Mo','Di','Mi','Do','Fr','Sa'];
  let html='';

  // KO admin
  html+=`<div class="ko-admin">
    <div class="ko-admin-title">⚙️ K.O.-Paarungen eintragen</div>`;

  // Auto-suggest button if groups complete
  if(allGroupsComplete()){
    html+=`<div style="font-size:12px;color:var(--green);margin-bottom:8px">✓ Gruppenphase abgeschlossen — KO-Paarungen können berechnet werden.<br>
    <span style="color:var(--muted)">Trage die offiziellen Paarungen unten ein.</span></div>`;
    // Show standings for reference
    html+=`<details style="margin-bottom:10px"><summary style="font-size:12px;color:var(--muted);cursor:pointer">Gruppensieger & -zweite anzeigen</summary>
    <div style="margin-top:6px;font-size:11px;color:var(--muted)">`;
    GROUPS.forEach(g=>{
      const st=calcStanding(g.n);
      html+=`<div style="margin-bottom:3px"><b style="color:var(--gold)">Gr.${g.n}:</b> 1.${st[0].team} · 2.${st[1].team} · 3.${st[2].team}</div>`;
    });
    html+='</div></details>';
  }

  KO_ROUNDS.forEach(r=>{
    const existing=(S.koMatches||[]).filter(m=>m.round===r.id);
    html+=`<div class="ko-round-block"><div class="ko-round-name">${r.label} (${existing.length} Spiele)</div>`;
    existing.forEach(m=>{
      html+=`<div class="ko-existing"><span>${m.h} – ${m.a}${m.t?' · '+m.t:''} ${m.dt?m.dt.slice(5):''}</span>
        <button class="btn-ko-rm" onclick="rmKo('${m.id}')">×</button></div>`;
    });
    html+=`<div class="ko-pair-row">
      <input type="text" class="ko-inp" id="kh_${r.id}" placeholder="Team 1">
      <input type="text" class="ko-inp" id="ka_${r.id}" placeholder="Team 2">
      <input type="text" class="ko-inp ko-date-inp" id="kt_${r.id}" placeholder="z.B. 19:00">
      <button class="btn-ko-add" onclick="addKo('${r.id}')">+</button>
    </div></div>`;
  });
  html+='</div>';

  // Group match results by date
  const allGMs=GROUP_MATCHES.slice().sort((a,b)=>(a.dt+a.t).localeCompare(b.dt+b.t));
  const byDate={};
  allGMs.forEach(m=>{
    if(!byDate[m.dt])byDate[m.dt]=[];
    byDate[m.dt].push(m);
  });
  html+=`<div class="sec-title">Gruppenphase</div>`;
  Object.keys(byDate).sort().forEach(dt=>{
    const d=new Date(dt+'T12:00:00');
    html+=`<div style="font-size:11px;color:var(--muted);padding:8px 0 4px">${DAYS[d.getDay()]}, ${d.getDate()}.${d.getMonth()+1}.</div>
    <div class="res-grid">`;
    byDate[dt].forEach(m=>{ html+=resCard(m); });
    html+='</div>';
  });

  // KO match results
  if((S.koMatches||[]).length>0){
    html+=`<div class="sec-title">K.O.-Phase</div>`;
    KO_ROUNDS.forEach(r=>{
      const rms=(S.koMatches||[]).filter(m=>m.round===r.id);
      if(rms.length>0){
        html+=`<div style="font-size:11px;color:var(--muted);padding:8px 0 4px">${r.label}</div><div class="res-grid">`;
        rms.forEach(m=>{ html+=resCard(m); });
        html+='</div>';
      }
    });
  }

  document.getElementById('resList').innerHTML=html;
}

function resCard(m){
  const res=(S.results||{})[m.id]||{h:'',a:''};
  const hasRes=res.h!==''&&res.a!=='';
  const bubs=S.players.map(p=>{
    const t=(S.tips[p]||{})[m.id];
    if(!t||t.h===''||t.a==='') return `<span class="tip-bub nd">${p}:?</span>`;
    const th=+t.h,ta=+t.a;
    if(!hasRes) return `<span class="tip-bub nd">${p}:${th}:${ta}</span>`;
    const rh=+res.h,ra=+res.a;
    const cls=(th===rh&&ta===ra)?'ok':Math.sign(rh-ra)===Math.sign(th-ta)?'ok':'nok';
    return `<span class="tip-bub ${cls}">${p}:${th}:${ta}</span>`;
  }).join('');
  const grpLbl=m.group?`Gr.${m.group}`:(m.round?KO_ROUNDS.find(r=>r.id===m.round)?.label||'':'')||'';
  return `<div class="res-card">
    <div class="res-top">
      <div><div class="res-teams">${m.h} – ${m.a}</div>
      <div class="res-date">${m.t||''} ${grpLbl}</div></div>
      <div class="res-score">
        <input type="number" inputmode="numeric" min="0" max="99" class="score-mini" value="${res.h}"
          onchange="saveRes('${m.id}','h',this.value)" placeholder="–">
        <span class="score-sep" style="color:var(--muted)">:</span>
        <input type="number" inputmode="numeric" min="0" max="99" class="score-mini" value="${res.a}"
          onchange="saveRes('${m.id}','a',this.value)" placeholder="–">
      </div>
    </div>
    <div class="tips-row">${bubs}</div>
  </div>`;
}

function saveRes(id,side,val){
  if(!S.results)S.results={};
  if(!S.results[id])S.results[id]={h:'',a:''};
  S.results[id][side]=val===''?'':parseInt(val);
  save(); renderResults();
  // re-render group tab if tips screen visible
  if(document.getElementById('tips').classList.contains('active')) renderByGroup();
}

function addKo(roundId){
  const h=document.getElementById('kh_'+roundId).value.trim();
  const a=document.getElementById('ka_'+roundId).value.trim();
  const t=document.getElementById('kt_'+roundId).value.trim();
  if(!h||!a) return;
  const id=roundId+'_'+Date.now();
  if(!S.koMatches)S.koMatches=[];
  S.koMatches.push({id,h,a,t,dt:'2026-07-'+roundId,round:roundId,phase:'ko'});
  save(); renderResults();
}
function rmKo(id){
  S.koMatches=(S.koMatches||[]).filter(m=>m.id!==id);
  if(S.results)delete S.results[id];
  Object.keys(S.tips).forEach(p=>{if(S.tips[p])delete S.tips[p][id];});
  save(); renderResults();
}


function setSyncDot(state){
  const d=document.getElementById('syncDot');
  if(!d)return;
  if(state==='syncing') d.style.background='var(--gold)';
  else if(state==='ok')  d.style.background='var(--green)';
  else                   d.style.background='var(--muted)';
}

    S.koMatches = Array.isArray(remote.koMatches) ? remote.koMatches : Object.values(remote.koMatches||{});
  }
  // re-render current screen
  if(!window._appStarted){
    window._appStarted = true;
    showPlayerSelect();
  } else {
    const tipEl = document.getElementById('tips');
    const resEl = document.getElementById('results');
    const selEl = document.getElementById('playerSelect');
    if(tipEl.classList.contains('active')){ renderByDate(); renderByGroup(); updateProgress(); updateSaveBar(); }
    if(resEl.classList.contains('active')){ renderResults(); }
    if(selEl.classList.contains('active')){ showPlayerSelect(); }
  }
});

</script>
</body>
</html>
